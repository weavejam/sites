name = "bugdrop-feedback"
main = "src/index.ts"
compatibility_date = "2024-01-29"
workers_dev = false

[[routes]]
pattern = "feedback.weavejam.com/*"
zone_name = "weavejam.com"

# Static assets directory (for widget.js)
[assets]
directory = "public"
binding = "ASSETS"

# Environment variables
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://sudoku.weavejam.com,https://toolsjam.com,https://www.toolsjam.com"
GITHUB_APP_NAME = "bugsjam"
MAX_SCREENSHOT_SIZE_MB = "5"

# Secrets (set with: wrangler secret put <KEY>)
# GITHUB_APP_ID
# GITHUB_PRIVATE_KEY

# Rate limiting KV namespace (optional — worker degrades gracefully if absent)
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<create with: wrangler kv namespace create RATE_LIMIT>"
